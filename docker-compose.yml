version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_password_here}
      POSTGRES_DB: garcom
    ports:
      - "54321:5432"
    volumes:
      - garcom_db_data:/var/lib/postgresql/data

  db-test:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: garcom_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://admin:${POSTGRES_PASSWORD:-your_password_here}@db:5432/garcom
      AUTH_SECRET: ${AUTH_SECRET:-change-me}
      FRONTEND_URL: https://garcomagil.com
      CORS_ORIGIN: https://garcomagil.com,https://www.garcomagil.com,https://admin.garcomagil.com
      MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN:-your_access_token_here}
      MERCADO_PAGO_PUBLIC_KEY: ${MERCADO_PAGO_PUBLIC_KEY:-your_public_key_here}
      MERCADO_PAGO_WEBHOOK_URL: https://garcomagil.com/api/webhooks/mercadopago
    command: sh -c "npx prisma migrate deploy && node dist/main.js"
    depends_on:
      - db
    ports:
      - "3001:3001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://garcomagil.com/api
        VITE_MERCADO_PAGO_PUBLIC_KEY: ${VITE_MERCADO_PAGO_PUBLIC_KEY:-your_public_key_here}
    environment:
      VITE_API_URL: ${VITE_API_URL:-https://garcomagil.com/api}
      VITE_MERCADO_PAGO_PUBLIC_KEY: ${VITE_MERCADO_PAGO_PUBLIC_KEY:-your_public_key_here}
    ports:
      - "4173:80"
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
    depends_on:
      - frontend
      - backend
    environment:
      CERTBOT_DOMAIN: ${CERTBOT_DOMAIN:-garcomagil.com}
    command: >
      sh -c "DOMAIN=${CERTBOT_DOMAIN:-garcomagil.com};
             if [ ! -f /etc/letsencrypt/live/$$DOMAIN/fullchain.pem ]; then
               echo 'Certificado não encontrado, gerando self-signed provisório';
               mkdir -p /etc/letsencrypt/live/$$DOMAIN;
               openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
                 -keyout /etc/letsencrypt/live/$$DOMAIN/privkey.pem \
                 -out /etc/letsencrypt/live/$$DOMAIN/fullchain.pem \
                 -subj \"/CN=$$DOMAIN\";
             fi;
             while :; do sleep 12h; nginx -s reload; done &
             exec nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    environment:
      CERTBOT_DOMAIN: ${CERTBOT_DOMAIN:-garcomagil.com}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-seu-email@dominio.com}
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    entrypoint: /bin/sh
    command: >
      -c "set -e;
          if [ ! -f /etc/letsencrypt/live/$${CERTBOT_DOMAIN}/fullchain.pem ]; then
            certbot certonly --webroot -w /var/www/certbot \
              -d $${CERTBOT_DOMAIN} --email $${CERTBOT_EMAIL} \
              --agree-tos --no-eff-email --non-interactive || true;
          fi;
          while :; do
            certbot renew --webroot -w /var/www/certbot --quiet || true;
            sleep 12h;
          done"
    restart: unless-stopped

volumes:
  garcom_db_data:
  certbot-etc:
  certbot-var: