version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_password_here}
      POSTGRES_DB: garcom
    volumes:
      - garcom_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d garcom"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://admin:${POSTGRES_PASSWORD_URL:-your_password_here}@db:5432/garcom
      AUTH_SECRET: ${AUTH_SECRET:-change-me}
      FRONTEND_URL: https://garcomagil.com
      CORS_ORIGIN: https://garcomagil.com,https://www.garcomagil.com
      API_URL: ${API_URL:-https://garcomagil.com/api}
      API_BASE_URL: ${API_URL:-https://garcomagil.com/api}
      MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN:-your_access_token_here}
      MERCADO_PAGO_PUBLIC_KEY: ${MERCADO_PAGO_PUBLIC_KEY:-your_public_key_here}
      MERCADO_PAGO_WEBHOOK_SECRET: ${MERCADO_PAGO_WEBHOOK_SECRET:-}
      MERCADO_PAGO_WEBHOOK_URL: https://garcomagil.com/api/webhooks/mercadopago
    command: sh -c "npx prisma migrate deploy && node dist/main.js"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - garcom_uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-https://garcomagil.com/api}
        VITE_MERCADO_PAGO_PUBLIC_KEY: ${VITE_MERCADO_PAGO_PUBLIC_KEY:-your_public_key_here}
    ports:
      - "127.0.0.1:4173:80"
    restart: unless-stopped

volumes:
  garcom_db_data:
  garcom_uploads:
