version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: garcom-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: garcom
    ports:
      - "5432:5432"
    volumes:
      - garcom_db_data:/var/lib/postgresql/data

  db-test:
    image: postgres:16-alpine
    container_name: garcom-db-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: garcom_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data

volumes:
  garcom_db_data:
