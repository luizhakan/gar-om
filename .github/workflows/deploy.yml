name: Deploy Production

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            config:
              - 'docker-compose.yml'

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e

            echo "🚀 Iniciando Deploy..."

            cd /root/garcom-prod

            echo "📥 Atualizando repositório..."
            git fetch --all
            git reset --hard origin/main

            # --- LÓGICA DE DEPLOY INTELIGENTE ---

            if [[ "${{ steps.changes.outputs.config }}" == 'true' ]]; then
              echo "⚠️ docker-compose.yml alterado. Reiniciando todo o stack..."
              docker compose down
              docker compose up -d --build

            else
              if [[ "${{ steps.changes.outputs.backend }}" == 'true' ]]; then
                echo "⚙️ Backend alterado. Reconstruindo imagem..."
                docker compose up -d --build backend
                echo "Running Migrations..."
                sleep 10
                docker compose exec -T backend npx prisma migrate deploy
              fi

              if [[ "${{ steps.changes.outputs.frontend }}" == 'true' ]]; then
                echo "🎨 Frontend alterado. Reconstruindo imagem..."
                docker compose up -d --build frontend
                nginx -s reload || true
              fi
            fi

            docker image prune -f

            echo "✅ Deploy Finalizado com Sucesso!"
            docker ps
